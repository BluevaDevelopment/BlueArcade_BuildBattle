      sources:
        popular: "por votación popular"
        default: "aleatoriamente"
      theme: "<gray>Tema seleccionado:</gray> <light_purple>{theme}</light_purple> <gray>{source}.</gray>"
    invalid: "<red>Ese tema no está disponible.</red>"
    not_available: "<red>Solo puedes votar mientras esperas a que empiece la partida.</red>"
    no_permission: "<red>No tienes permiso para votar por</red> <yellow>{theme}</yellow><red>.</red>"

build:
