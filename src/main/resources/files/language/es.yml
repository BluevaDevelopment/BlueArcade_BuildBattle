setup_messages:
  plot:
    usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> build_battle plot <add|set|remove|spawn></yellow>"
    invalid_id: "{prefix} <red>ID de parcela no válido.</red>"
    not_found: "{prefix} <red>Esa parcela no existe.</red>"
    add:
      must_use_stick: "{prefix} <red>Selecciona primero dos esquinas con la herramienta de setup.</red>"
      too_shallow: "{prefix} <red>La parcela es demasiado baja. La selección debe tener al menos 3 bloques de altura (1 de suelo + 2 de aire).</red>"
      no_floor: "{prefix} <red>No se detectó suelo. La capa más baja de la selección debe contener bloques.</red>"
      too_many_floor_layers: "{prefix} <red>Se detectaron demasiadas capas de suelo. El suelo debe tener 1-2 capas de bloques. Elimina los bloques sobrantes sobre el suelo.</red>"
      set: "{prefix} <green>Región de la parcela {index} guardada.</green> <gray>Bloques:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray> <gray>Suelo:</gray> <yellow>{floor}</yellow>"
      spawn_set: "{prefix} <gray>Aparición de la parcela establecida en tu ubicación actual. Puedes cambiarla cuando quieras con</gray> <yellow>/baa game <id> build_battle plot spawn set {index}</yellow>"
    set:
      usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> build_battle plot set <plot_id></yellow>"
      success: "{prefix} <green>Región de la parcela {index} actualizada.</green> <gray>Bloques:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray> <gray>Suelo:</gray> <yellow>{floor}</yellow>"
    remove:
      usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> build_battle plot remove <plot_id></yellow>"
      success: "{prefix} <green>Plot {index} has been eliminado.</green>"
    spawn:
      usage: "{prefix} <red>Uso:</red> <yellow>/baa game <id> build_battle plot spawn set <plot_id></yellow>"
      set: "{prefix} <green>Aparición de la parcela {index} actualizada a tu ubicación actual.</green>"
