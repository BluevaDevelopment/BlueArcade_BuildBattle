  - "<aqua>Juego</aqua> <gray>-</gray> <light_purple><bold>Build Battle</bold></light_purple>"
  - " "
  - "<white>Descripción:</white>"
  - "<gray>Vota por un tema, construye tu creación,</gray>"
  - "<gray>y después vota las construcciones de los demás.</gray>"
  - " "
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"

vote_menu:
  name: "<light_purple>Build Battle</light_purple>"
  lore:
    - "<gray>Vota un tema y empieza a construir.</gray>"
    - "<gray>Puntúa las creaciones de otros jugadores.</gray>"
